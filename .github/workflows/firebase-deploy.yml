name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build member site
        run: BUILD_TARGET=member npx vite build
        env:
          VITE_API_BASE: https://redrock-api-production.up.railway.app

      - name: Build staff site
        run: BUILD_TARGET=staff npx vite build
        env:
          VITE_API_BASE: https://redrock-api-production.up.railway.app

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@latest deploy --only hosting --project redrock-dev-a35c1
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
